# site properties and page defaults
title: Radulescu Lab
subtitle: ""
description: An easy-to-use, flexible website template for labs, with automatic citations, GitHub tag imports, pre-built components, and more.
logo-text: false
show-title: false
show-subtitle: false
header-dark: false
header: ""
footer: ""
footer-dark: false
proofer: false

# grouped nav dropdowns (see page front matter nav.group)
nav_groups:
  people:
    title: People
    order: 4

# site social media and other links
links:
  email: angela.radulescu@mssm.edu
  orcid: 0000-0003-2274-4265
  google-scholar: galouqYAAAAJ
  github: angelaradulescu
  bluesky: angelaradulescu.bsky.social
  linkedin: angela-radulescu-900a7224

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
